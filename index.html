<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모두의 예술</title>
  <link href="style.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- 상단 네비게이션 -->
  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">✦</span>
        <span class="logo-text">모두의 예술</span>
      </div>
      <nav class="nav">
        <a href="#" class="nav-link">전시·공연</a>
        <a href="#" class="nav-link">공모전</a>
        <a href="#" class="nav-link">AI 추천</a>
        <a href="#" class="nav-link nav-cta">시작하기</a>
      </nav>
    </div>
  </header>

  <!-- 히어로 섹션 -->
  <section class="hero">
    <div class="hero-content">
      <p class="hero-tag">문화예술 플랫폼</p>
      <h1 class="hero-title">예술을<br><span class="highlight">모두에게</span></h1>
      <p class="hero-desc">
        전시·공연 정보부터 예술인 공모전까지<br>
        AI가 당신에게 맞는 예술을 찾아드립니다
      </p>
      <div class="hero-buttons">
        <a href="#" class="btn-primary">전시·공연 보기</a>
        <a href="#" class="btn-secondary">공모전 찾기</a>
      </div>
    </div>
    <div class="hero-visual">
      <div class="visual-card card1">
        <span class="card-emoji">🎨</span>
        <p>전시 정보</p>
      </div>
      <div class="visual-card card2">
        <span class="card-emoji">🎭</span>
        <p>공연 정보</p>
      </div>
      <div class="visual-card card3">
        <span class="card-emoji">✨</span>
        <p>AI 맞춤 추천</p>
      </div>
      <div class="visual-card card4">
        <span class="card-emoji">🏆</span>
        <p>공모전 정보</p>
      </div>
    </div>
  </section>

  <!-- 특징 섹션 -->
  <section class="features">
    <div class="features-inner">
      <div class="feature-item">
        <div class="feature-icon">🎨</div>
        <h3>전시·공연 정보</h3>
        <p>전국 전시와 공연 정보를 한눈에 확인하세요</p>
      </div>
      <div class="feature-item">
        <div class="feature-icon">🏆</div>
        <h3>공모전 정보</h3>
        <p>공공기관·사기업 예술 공모전 정보를 모았습니다</p>
      </div>
      <div class="feature-item">
        <div class="feature-icon">🤖</div>
        <h3>AI 맞춤 추천</h3>
        <p>취향과 관심사 기반으로 AI가 추천해드립니다</p>
      </div>
    </div>
  </section>

  <script src="main.js"></script>
</body>
</html>
