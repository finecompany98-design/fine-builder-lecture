name: 공모·지원사업 자동 수집

on:
  schedule:
    # 매일 오전 6시 KST (UTC 21:00 전날)
    - cron: '0 21 * * *'
  workflow_dispatch: # GitHub Actions 탭에서 수동 실행 가능

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 의존성 설치
        working-directory: scripts
        run: npm install

      - name: 데이터 수집 및 Firestore 저장
        working-directory: scripts
        run: node scrape.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: LLM 후처리 (eligibility/tags/supportType/documents 추출)
        working-directory: scripts
        run: node process.js --limit 100
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
