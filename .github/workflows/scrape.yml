name: 공모·지원사업 자동 수집

on:
  schedule:
    # 매주 월요일 오전 9시 (KST = UTC+9 → UTC 00:00)
    - cron: '0 0 * * 1'
  workflow_dispatch: # GitHub Actions 탭에서 수동 실행 가능

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 스크래퍼 의존성 설치
        working-directory: scripts
        run: npm install

      - name: 데이터 수집 및 Firestore 저장
        working-directory: scripts
        run: node scrape.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
